| ...   | ...             | ...               | Low  |

#### Category B — Formatting Utilities
| Function | Current Pattern | Proposed Utility | Risk |
|---------|----------------|-----------------|------|
| ...     | ...            | ...              | Low  |

#### Category C — Calculation Utilities
| Function | Current Location | Proposed Utility | Risk |
|---------|-----------------|-----------------|------|
| ...     | ...             | ...              | Low  |

#### Category D — Reusable Hooks
| Hook | Currently Duplicated In | Proposed Hook | Risk |
|------|------------------------|--------------|------|
| ...  | ...                    | ...          | Med  |

#### Category E — Component Splits
| Component | Current Size | Split Into | Risk |
|-----------|-------------|-----------|------|
| ...       | ~XXX lines  | ...       | Med-High |

### Prioritized Refactor Plan

| Priority | Task | Risk | Estimated Commits |
|----------|------|------|------------------|
| 1 | ... | Low | 1 |
| 2 | ... | Low | 1 |
| 3 | ... | Medium | 2 |

### Risks
- [Risk 1 — severity: Low / Medium / High]
- [Risk 2 — ...]

### Deferred (Recommend Phase 0.5 or later)
- [Item deferred and reason]

### Files Reviewed
- [file path]
- [...]

### Next Step
[One clear recommended action — e.g. "Start with constants extraction in Phase 0.4 Commit 1", "Review App.jsx for component split candidates before planning"]
```"""
